<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FocusFlight – Deep Focus Timer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            sky: { 950: '#0a1628' },
            brand: {
              blue: '#1e40af',
              light: '#60a5fa',
              gold: '#f59e0b',
            }
          },
          animation: {
            'float': 'float 6s ease-in-out infinite',
            'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            'fadeIn': 'fadeIn 0.5s ease-out',
            'slideUp': 'slideUp 0.4s ease-out',
            'takeoff': 'takeoff 1.5s ease-in-out forwards',
          },
          keyframes: {
            float: { '0%, 100%': { transform: 'translateY(0px)' }, '50%': { transform: 'translateY(-10px)' } },
            fadeIn: { from: { opacity: '0' }, to: { opacity: '1' } },
            slideUp: { from: { opacity: '0', transform: 'translateY(20px)' }, to: { opacity: '1', transform: 'translateY(0)' } },
            takeoff: { '0%': { transform: 'translateX(0) translateY(0) rotate(0deg)' }, '50%': { transform: 'translateX(30px) translateY(-20px) rotate(-15deg)' }, '100%': { transform: 'translateX(100vw) translateY(-100px) rotate(-20deg)', opacity: '0' } }
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap');
    * { font-family: 'Inter', sans-serif; }
    .font-display { font-family: 'Space Grotesk', sans-serif; }
    .sky-bg { background: linear-gradient(180deg, #0a1628 0%, #0f2744 30%, #1a3a6b 60%, #1e4080 100%); }
    .card-glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
    .card-glass-light { background: rgba(255,255,255,0.08); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.15); }
    .boarding-pass { background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%); border-radius: 16px; position: relative; overflow: hidden; }
    .boarding-pass::before { content: ''; position: absolute; left: -12px; top: 50%; transform: translateY(-50%); width: 24px; height: 24px; background: #0f2744; border-radius: 50%; }
    .boarding-pass::after { content: ''; position: absolute; right: -12px; top: 50%; transform: translateY(-50%); width: 24px; height: 24px; background: #0f2744; border-radius: 50%; }
    .tear-line { border-left: 2px dashed #cbd5e1; position: absolute; left: 35%; top: 0; bottom: 0; }
    .star-field { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
    .nav-item { transition: all 0.2s; }
    .nav-item.active { color: #60a5fa; }
    .nav-item:not(.active) { color: #94a3b8; }
    .range-slider { -webkit-appearance: none; width: 100%; height: 6px; border-radius: 3px; background: rgba(255,255,255,0.2); outline: none; }
    .range-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 22px; height: 22px; border-radius: 50%; background: #60a5fa; cursor: pointer; box-shadow: 0 0 10px rgba(96,165,250,0.5); transition: all 0.2s; }
    .range-slider::-webkit-slider-thumb:hover { transform: scale(1.2); }
    .seat-btn { transition: all 0.3s; }
    .seat-btn.selected { background: linear-gradient(135deg, #1e40af, #3b82f6); border-color: #60a5fa; transform: scale(1.02); }
    .flight-progress { transition: width 1s linear; }
    .cloud-1 { animation: cloud1 20s linear infinite; position: fixed; opacity: 0.06; }
    .cloud-2 { animation: cloud2 30s linear infinite; position: fixed; opacity: 0.04; }
    @keyframes cloud1 { from { transform: translateX(-200px); } to { transform: translateX(110vw); } }
    @keyframes cloud2 { from { transform: translateX(110vw); } to { transform: translateX(-200px); } }
    .badge-glow { box-shadow: 0 0 20px rgba(245, 158, 11, 0.3); }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }
  </style>
</head>
<body class="sky-bg min-h-screen text-white overflow-x-hidden">

  <!-- Stars background -->
  <canvas class="star-field" id="starCanvas"></canvas>

  <!-- Clouds -->
  <div class="cloud-1 text-white text-8xl" style="top: 15%; left: -100px;">☁️</div>
  <div class="cloud-2 text-white text-6xl" style="top: 35%; right: -100px;">☁️</div>

  <!-- App Container -->
  <div id="app" class="relative z-10 max-w-md mx-auto min-h-screen flex flex-col pb-20">
    <!-- Pages rendered by JS -->
  </div>

  <!-- Bottom Nav -->
  <nav class="fixed bottom-0 left-0 right-0 z-50" style="background: rgba(10,22,40,0.95); backdrop-filter: blur(20px); border-top: 1px solid rgba(255,255,255,0.1);">
    <div class="max-w-md mx-auto flex justify-around py-3">
      <button onclick="navigate('home')" class="nav-item flex flex-col items-center gap-1" id="nav-home">
        <span class="text-xl">🏠</span>
        <span class="text-xs font-medium">Home</span>
      </button>
      <button onclick="navigate('book')" class="nav-item flex flex-col items-center gap-1" id="nav-book">
        <span class="text-xl">✈️</span>
        <span class="text-xs font-medium">Book</span>
      </button>
      <button onclick="navigate('logbook')" class="nav-item flex flex-col items-center gap-1" id="nav-logbook">
        <span class="text-xl">📒</span>
        <span class="text-xs font-medium">Logbook</span>
      </button>
      <button onclick="navigate('stats')" class="nav-item flex flex-col items-center gap-1" id="nav-stats">
        <span class="text-xl">📊</span>
        <span class="text-xs font-medium">Stats</span>
      </button>
      <button onclick="navigate('badges')" class="nav-item flex flex-col items-center gap-1" id="nav-badges">
        <span class="text-xl">🏅</span>
        <span class="text-xs font-medium">Badges</span>
      </button>
    </div>
  </nav>

  <script type="module" src="src/app.js"></script>
  <script>
    // Star field
    const canvas = document.getElementById('starCanvas');
    const ctx = canvas.getContext('2d');
    function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);
    const stars = Array.from({length: 120}, () => ({ x: Math.random() * window.innerWidth, y: Math.random() * window.innerHeight * 0.6, r: Math.random() * 1.5 + 0.5, opacity: Math.random() * 0.7 + 0.3, speed: Math.random() * 0.3 + 0.1 }));
    function drawStars() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      stars.forEach(s => {
        s.opacity += (Math.random() - 0.5) * 0.05;
        s.opacity = Math.max(0.1, Math.min(1, s.opacity));
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${s.opacity})`;
        ctx.fill();
      });
      requestAnimationFrame(drawStars);
    }
    drawStars();
  </script>
</body>
</html>
